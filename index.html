<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKU Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-gray-900 tracking-tight">SKU Generator</h1>
      <span class="text-xs text-gray-400 hidden sm:inline">Cartesian product SKU builder</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 flex flex-col lg:flex-row gap-6">

    <!-- LEFT PANEL -->
    <section class="lg:w-[420px] shrink-0 flex flex-col gap-5">

      <!-- Template Bar -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex flex-col gap-3">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Templates</label>
        <div class="flex gap-2">
          <select id="templateSelect"
            class="flex-1 rounded-lg border border-gray-300 text-sm px-3 py-2 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none bg-white">
            <option value="">— none —</option>
          </select>
          <button onclick="loadTemplate()" title="Load"
            class="px-3 py-2 rounded-lg bg-brand-50 text-brand-600 hover:bg-brand-100 text-sm font-medium transition">Load</button>
        </div>
        <div class="flex gap-2">
          <button onclick="saveTemplate()"
            class="flex-1 px-3 py-2 rounded-lg bg-brand-600 text-white hover:bg-brand-700 text-sm font-medium transition">Save
            Template</button>
          <button onclick="deleteTemplate()"
            class="px-3 py-2 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 text-sm font-medium transition">Delete</button>
        </div>
      </div>

      <!-- Model & Sort -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex flex-col gap-4">
        <div>
          <label for="modelName" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Model
            Name (Base Code)</label>
          <input id="modelName" type="text" placeholder="e.g. M28SN"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none"
            oninput="autoSave()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Sort Direction</label>
          <div class="flex rounded-lg overflow-hidden border border-gray-300">
            <button id="btnAsc" onclick="setSortDir('ASC'); autoSave()"
              class="flex-1 py-2 text-sm font-medium transition">ASC</button>
            <button id="btnDesc" onclick="setSortDir('DESC'); autoSave()"
              class="flex-1 py-2 text-sm font-medium transition">DESC</button>
          </div>
        </div>
      </div>

      <!-- Attributes -->
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-700">Attributes</h2>
        <button onclick="addAttribute()"
          class="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-brand-600 text-white hover:bg-brand-700 text-xs font-medium transition">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M12 5v14m-7-7h14" />
          </svg>
          Add Attribute
        </button>
      </div>

      <div id="attrContainer" class="flex flex-col gap-3"></div>

      <!-- Generate -->
      <button onclick="generate()"
        class="w-full py-3 rounded-xl bg-brand-600 text-white font-semibold text-sm hover:bg-brand-700 active:scale-[0.98] transition shadow-sm">
        Generate SKUs
      </button>
    </section>

    <!-- RIGHT PANEL -->
    <section class="flex-1 min-w-0">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col h-full">
        <!-- Summary -->
        <div id="summary" class="p-4 border-b border-gray-100 text-sm text-gray-500">
          Configure attributes and click <span class="font-medium text-gray-700">Generate</span> to see SKUs.
        </div>
        <!-- SKU List -->
        <div id="skuList" class="overflow-y-auto flex-1 font-mono text-sm"></div>
        <!-- Footer -->
        <div id="resultFooter" class="p-3 border-t border-gray-100 flex justify-end gap-2 hidden">
          <button onclick="copyAll()"
            class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-medium transition">Copy
            All</button>
        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>

</body>

</html>
